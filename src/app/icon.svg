<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="64" height="64" fill="url(#g)"/>
    <!-- Football field lines -->
    <rect x="10" y="10" width="44" height="44" rx="3" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
    <line x1="32" y1="10" x2="32" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="8" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
    <!-- P letter -->
    <text x="21" y="44" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" letter-spacing="-1">P</text>
  </g>
</svg>
